<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice6</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">

        function App() {
            const [count, setCount] = React.useState(0);
            const autoClickRef = React.useRef(null);

            function Increment() {
                setCount(prev => prev + 1)
            }

            function autoClick(){
                if(autoClickRef.current) return;
                autoClickRef.current = setInterval(() => {
                     setCount(prev => prev + 1)   
                }, 1000);
            }
            
            function resetCount(){
                setCount(0)
                if(autoClickRef.current){
                clearInterval(autoClickRef.current)
                 autoClickRef.current = null;
                    }

            }
            
     
            return (
                <>
                    <button
                        onClick={Increment}>
                        Clicked {count} Times
                    </button>

                    <button
                        onClick={resetCount}>
                        Reset
                    </button>

                    <button
                        onClick = {autoClick}>
                        Auto Click
                    </button>

                </>
            )
        }


        const container = document.querySelector("#root")
        const root = ReactDOM.createRoot(container)
        root.render(<App />)
    </script>
</body>

</html>
