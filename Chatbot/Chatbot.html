<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bot</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/supersimpledev/Chatbot.js"> </script>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 0;
            margin-bottom: 0;
        }

        .send-button {
            background-color: rgb(25, 135, 84);
            color: white;
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .chat-input {
            padding: 12px 20px;
            border-radius: 10px;
            border-width: 1px;
            font-size: 15px;
            flex-grow: 1;
        }

        .chat-input-container {
            display: flex;


        }

        .app-container {
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-message-user {
            display: flex;
            justify-content: end;
            align-items: start;
        }

        .chat-message-robot {
            display: flex;
            align-items: start;

        }

        .chat-message-text {
            background-color: rgb(238, 238, 238);
            padding: 15px 20px;
            border-radius: 10px;
            margin-right: 10px;
            margin-left: 10px;
            max-width: 300px;
            margin-top: 20px;

        }

        .chat-message-profile {
            width: 60px;
        }
    </style>

</head>

<body>
    <div class="js-container"></div>
    <script type="text/babel">



        function ChatInput({ chatMessages, setChatMessages }) {
            const [saveInput, setInputText] = React.useState('')
            const [isLoading, setIsLoading] = React.useState(false)

            function saveInputText(event) {
                setInputText(event.target.value)
            }

            async function sendMessage() {
                if (!saveInput.trim() || isLoading) return;

                setIsLoading(true)

                const newChatMessage = [...chatMessages,
                {
                    message: saveInput,
                    sender: "user",
                    id: crypto.randomUUID()
                }]
                setChatMessages(newChatMessage);

                const response = await Chatbot.getResponseAsync(saveInput)
                setChatMessages([...newChatMessage,
                {
                    message: response,
                    sender: "robot",
                    id: crypto.randomUUID()
                }]);

                setInputText('')
                setIsLoading(false)
            }

            return (
                <div className="chat-input-container">
                    <input
                        placeholder="Send a message to Chatbot"
                        size="30"
                        className="chat-input"
                        onChange={saveInputText}
                        value={saveInput}
                        disabled={isLoading}
                        onKeyDown={(e) => {
                            if (e.key === "Enter") {
                                sendMessage();
                            }
                            if (e.key === "Escape") {
                                setInputText('');
                            }
                        }}
                    />
                    <button
                        onClick={sendMessage}
                        disabled={isLoading}
                        className="send-button">
                        {isLoading ? "Loading..." : "Send"}
                    </button>
                </div>
            );
        }

        function ChatMessage({ message, sender }) {

            return (
                <div className={sender === "user" ?
                    'chat-message-user' : 'chat-message-robot'}>

                    {sender === "robot" && (
                        <img src="images/Chatbot.png"
                            className="chat-message-profile"
                        />
                    )}

                    <div class="chat-message-text">
                        {message}
                    </div>

                    {sender === "user" && (
                        <img src="images/User.png"
                            className="chat-message-profile"
                        />
                    )}
                </div>
            );
        }

        function ChatMessages({ chatMessages }) {

            return (
                <div className="chat-message-container">
                    {chatMessages.map((chatMessages) => {
                        return (
                            <ChatMessage
                                message={chatMessages.message}
                                sender={chatMessages.sender}
                                key={chatMessages.id}
                            />
                        )
                    })
                    }
                </div>
            )

        }


        function App() {
            const [chatMessages, setChatMessages] = React.useState([
                {
                    message: "Hello Chatbot",
                    sender: "user",
                    id: "0"
                },
                {
                    message: "Hello! How can i help you",
                    sender: "robot",
                    id: "1"
                },
                {
                    message: "can you get me todays date?",
                    sender: "user",
                    id: "2"
                },
                {
                    message: "Today is September 27",
                    sender: "robot",
                    id: "3"
                }])

            return (
                <div className="app-container">


                    <ChatMessages
                        chatMessages={chatMessages}
                    />
                    <ChatInput
                        chatMessages={chatMessages}
                        setChatMessages={setChatMessages}
                    />

                </div>
            )
        }

        const container = document.querySelector(".js-container")
        ReactDOM.createRoot(container).render(<App />)

    </script>
</body>

</html>
