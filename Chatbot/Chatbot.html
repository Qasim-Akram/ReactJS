<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bot</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div class="js-container"></div>
    <script type="text/babel">

        function ChatInput() {
            return (
                <>
                    <input placeholder="Send a message to Chatbot" size="30" />
                    <button>Send</button>
                </>
            );
        }

        function ChatMessage(props) {
            const message = props.message
            const sender = props.sender

            if (sender === "robot")
                return (
                    <div>
                        {message}
                        <img src="images/Chatbot.png" width="30" />
                    </div>

                );

            return (
                <div>
                    {message}
                    <img src="images/User.png" width="30" />
                </div>
            );
        }


        const app = (
            <>
                <ChatInput />
                <ChatMessage message="Hello Chatbot" sender="user" />
                <ChatMessage message="Hello! How can i help you" sender="robot" />
                <ChatMessage message="can you get me todays date?" sender="user" />
                <ChatMessage message="Today is September 27" sender="robot" />

            </>
        )

        const container = document.querySelector(".js-container")
        ReactDOM.createRoot(container).render(app)

    </script>
</body>

</html>
